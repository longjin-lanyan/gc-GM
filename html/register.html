<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号注册 - 原神 GM 管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 440px;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .message.info { background: #d1ecf1; color: #0c5460; display: block; }
        #qqStatus {
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        #qqStatus.ok { color: #28a745; display: block; }
        #qqStatus.warn { color: #dc3545; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2> 账号注册</h2>
        <form id="registerForm">
            <!-- 用户名 -->
            <div class="form-group">
                <label for="username">账号名</label>
                <input type="text" id="username" maxlength="50" required
                       placeholder="输入你想要的游戏账号名">
                <div class="hint">支持任意文字（中文、英文、空格等），最多50字符</div>
            </div>

            <!-- QQ号 -->
            <div class="form-group">
                <label for="qq">绑定QQ号</label>
                <input type="text" id="qq" required
                       placeholder="输入你的QQ号">
                <div class="hint">一个QQ号最多注册3个账号</div>
                <div id="qqStatus"></div>
            </div>

            <!-- 服务器选择（多服务器架构自动显示） -->
            <div class="form-group" id="serverGroup" style="display:none;">
                <label for="serverUuid">目标服务器</label>
                <select id="serverUuid">
                    <option value="">主 Dispatch 服务器</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">📝 注册账号</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const qqInput = document.getElementById('qq');
        const qqStatusDiv = document.getElementById('qqStatus');
        const serverGroup = document.getElementById('serverGroup');
        const serverSelect = document.getElementById('serverUuid');

        // QQ号格式验证
        const QQ_REGEX = /^[1-9]\d{4,14}$/;

        // ========== 加载服务器列表 ==========
        async function loadServers() {
            try {
                const res = await fetch('/api/account/servers');
                const data = await res.json();
                if (data.retcode === 200 && data.data && Object.keys(data.data).length > 0) {
                    serverGroup.style.display = 'block';
                    const servers = data.data;
                    for (const [uuid, name] of Object.entries(servers)) {
                        const option = document.createElement('option');
                        option.value = uuid;
                        option.textContent = name;
                        serverSelect.appendChild(option);
                    }
                }
            } catch (e) {
                console.log('单服务器模式');
            }
        }

        // ========== 显示消息 ==========
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
        }

        // ========== QQ号实时查询注册状态 ==========
        let qqCheckTimer = null;
        qqInput.addEventListener('input', () => {
            clearTimeout(qqCheckTimer);
            qqStatusDiv.className = '';
            qqStatusDiv.textContent = '';

            const qq = qqInput.value.trim();
            if (!QQ_REGEX.test(qq)) {
                if (qq.length > 0) {
                    qqStatusDiv.textContent = '⚠ QQ号格式不正确（5-15位纯数字，不能以0开头）';
                    qqStatusDiv.className = 'warn';
                }
                return;
            }

            qqCheckTimer = setTimeout(async () => {
                try {
                    const res = await fetch('/api/account/qq-status?qq=' + qq);
                    const data = await res.json();
                    if (data.retcode === 200) {
                        const remain = data.maxAllowed - data.registeredCount;
                        if (data.canRegister) {
                            qqStatusDiv.textContent = '✅ 已注册 ' + data.registeredCount + ' 个，还可注册 ' + remain + ' 个';
                            qqStatusDiv.className = 'ok';
                        } else {
                            qqStatusDiv.textContent = '❌ 已注册 ' + data.registeredCount + ' 个，已达上限！';
                            qqStatusDiv.className = 'warn';
                        }
                    }
                } catch (e) {
                    console.error('查询失败', e);
                }
            }, 500);
        });

        // ========== 提交注册 ==========
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const qq = qqInput.value.trim();
            const serverUuid = document.getElementById('serverUuid').value;

            if (!username) {
                showMessage('请输入账号名', 'error');
                return;
            }
            if (!QQ_REGEX.test(qq)) {
                showMessage('请输入正确的QQ号', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ 注册中，请稍候...';
            showMessage('正在连接服务器创建账号...', 'info');

            try {
                const res = await fetch('/api/account/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, qq, serverUuid })
                });

                const data = await res.json();

                if (data.success || data.retcode === 200) {
                    showMessage(data.message || '注册成功！', 'success');
                    qqInput.dispatchEvent(new Event('input'));
                } else {
                    showMessage('❌ ' + (data.message || '注册失败'), 'error');
                }
            } catch (err) {
                showMessage('❌ 网络错误：无法连接到服务器', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📝 注册账号';
            }
        });

        // 初始化
        loadServers();
    </script>
</body>
</html>
