<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号注册 · 原神私服</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap');

        :root {
            --gold:#c8a96e; --gold-l:#e8cfa0; --gold-d:#a07840;
            --bg:#0c1018;
            --sf:rgba(255,255,255,0.05); --sf2:rgba(255,255,255,0.08);
            --bd:rgba(200,169,110,0.2);  --bd2:rgba(200,169,110,0.45);
            --tx:#e8dcc8; --tx2:rgba(232,220,200,0.55);
            --gr:#5dbe8a; --rd:#e05c5c; --yw:#e8b84b;
            --r:14px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Noto Serif SC',serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 55% at 20% 8%, rgba(120,90,40,.16) 0%, transparent 55%),
                radial-gradient(ellipse 55% 75% at 82% 92%, rgba(70,55,120,.13) 0%, transparent 55%),
                url('/data/bg/kun-gmligt.jpg') center/cover no-repeat fixed;
            min-height:100vh;
            color:var(--tx);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:flex-start;
            padding:32px 20px 60px;
        }
        body::before {
            content:'';
            position:fixed; inset:0;
            background:rgba(8,12,20,.76);
            backdrop-filter:blur(2px);
            z-index:0;
        }

        .wrap {
            position:relative; z-index:1;
            width:100%; max-width:480px;
            display:flex; flex-direction:column; gap:16px;
        }

        /* ── Header ── */
        .hdr { text-align:center; padding:8px 0 4px; }
        .hdr-icon { font-size:46px; line-height:1; filter:drop-shadow(0 0 14px rgba(200,169,110,.4)); animation:float 4s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
        .hdr h1 { font-size:24px; font-weight:700; color:var(--gold-l); margin-top:12px; letter-spacing:3px; text-shadow:0 0 24px rgba(200,169,110,.3); }
        .hdr p  { font-size:13px; color:var(--tx2); margin-top:6px; letter-spacing:1px; }

        /* ── Card ── */
        .card {
            background:rgba(12,16,24,.75);
            border:1px solid var(--bd);
            border-radius:var(--r);
            backdrop-filter:blur(20px);
            box-shadow:0 4px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
            overflow:hidden;
        }
        .card-head {
            padding:14px 22px;
            border-bottom:1px solid var(--bd);
            display:flex; align-items:center; gap:8px;
        }
        .card-title { font-size:13px; font-weight:600; color:var(--gold); letter-spacing:1.5px; }
        .card-title::before { content:''; display:inline-block; width:3px; height:13px; background:linear-gradient(180deg,var(--gold),var(--gold-d)); border-radius:2px; margin-right:8px; vertical-align:middle; }
        .card-body { padding:22px; }

        /* ── Quota bar ── */
        .quota-row {
            display:flex; align-items:center; gap:12px;
            background:var(--sf); border:1px solid var(--bd);
            border-radius:10px; padding:12px 16px; margin-bottom:20px;
        }
        .quota-icon { font-size:18px; }
        .quota-info { flex:1; }
        .quota-label { font-size:11px; color:var(--tx2); letter-spacing:.8px; margin-bottom:5px; }
        .qbar { background:rgba(255,255,255,.07); border-radius:4px; height:5px; overflow:hidden; }
        .qbar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--gold-d),var(--gold)); transition:width .5s ease; }
        .qbar-fill.full { background:linear-gradient(90deg,#b83030,var(--rd)); }
        .qbar-num { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gold); white-space:nowrap; }

        /* ── My accounts table ── */
        .accs-title { font-size:12px; color:var(--tx2); letter-spacing:.8px; margin-bottom:10px; }
        .accs-list { display:flex; flex-direction:column; gap:7px; margin-bottom:20px; }
        .acc-row {
            display:flex; align-items:center; justify-content:space-between;
            background:var(--sf); border:1px solid var(--bd);
            border-radius:8px; padding:9px 14px;
        }
        .acc-name { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--gold-l); }
        .acc-date { font-size:11px; color:var(--tx2); font-family:'JetBrains Mono',monospace; }
        .accs-empty { font-size:13px; color:var(--tx2); text-align:center; padding:14px 0 20px; }

        /* ── Form ── */
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:12px; color:var(--tx2); letter-spacing:.8px; margin-bottom:7px; }
        input[type=text] {
            width:100%;
            background:var(--sf); border:1px solid var(--bd); border-radius:9px;
            padding:12px 15px; font-size:15px; color:var(--tx);
            font-family:'JetBrains Mono',monospace;
            outline:none; transition:border-color .2s, box-shadow .2s, background .2s;
        }
        input[type=text]::placeholder { color:rgba(232,220,200,.22); }
        input[type=text]:focus { border-color:var(--gold); background:rgba(200,169,110,.07); box-shadow:0 0 0 3px rgba(200,169,110,.1); }
        input[type=text].invalid { border-color:var(--rd); box-shadow:0 0 0 3px rgba(224,92,92,.1); }
        .hint { font-size:11px; color:var(--tx2); font-family:'JetBrains Mono',monospace; margin-top:5px; }
        .hint.ok  { color:var(--gr); }
        .hint.err { color:var(--rd); }

        /* ── Rules ── */
        .rules {
            background:rgba(200,169,110,.06); border:1px solid rgba(200,169,110,.14);
            border-radius:10px; padding:13px 16px; margin-bottom:20px;
        }
        .rules-title { font-size:12px; color:var(--gold); font-weight:600; letter-spacing:1px; margin-bottom:8px; }
        .rules ul { list-style:none; display:flex; flex-direction:column; gap:4px; }
        .rules ul li { font-size:12px; color:var(--tx2); padding-left:14px; position:relative; line-height:1.5; }
        .rules ul li::before { content:'·'; position:absolute; left:4px; color:var(--gold-d); }
        .rules ul li strong { color:var(--gold); }

        /* ── Button ── */
        .btn {
            width:100%; padding:13px; border:none; border-radius:9px;
            font-size:15px; font-family:'Noto Serif SC',serif; font-weight:600;
            letter-spacing:3px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
        }
        .btn-primary {
            background:linear-gradient(135deg,var(--gold-d) 0%,var(--gold) 50%,var(--gold-d) 100%);
            background-size:200% 100%;
            color:#1a1008;
            box-shadow:0 4px 20px rgba(200,169,110,.28);
        }
        .btn-primary:hover:not(:disabled) { background-position:100% 0; box-shadow:0 6px 28px rgba(200,169,110,.42); transform:translateY(-1px); }
        .btn-primary:disabled { opacity:.45; cursor:not-allowed; transform:none; }
        .btn-spin { display:none; width:16px; height:16px; border:2px solid rgba(26,16,8,.3); border-top-color:#1a1008; border-radius:50%; animation:spin .7s linear infinite; margin:0 auto; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .btn.loading .btn-text { display:none; }
        .btn.loading .btn-spin  { display:block; }

        /* ── Result ── */
        .result {
            border-radius:10px; padding:14px 18px; font-size:13px;
            display:none; animation:fadeUp .3s ease;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
        .result.ok  { display:block; background:rgba(93,190,138,.1); border:1px solid rgba(93,190,138,.32); color:#7dde9e; }
        .result.err { display:block; background:rgba(224,92,92,.1); border:1px solid rgba(224,92,92,.32); color:#f08080; }
        .result .r-icon  { font-size:18px; margin-bottom:4px; }
        .result .r-title { font-weight:700; font-size:14px; margin-bottom:3px; }
        .result .r-acc   { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:var(--gold-l); margin:8px 0; padding:7px 12px; background:rgba(0,0,0,.22); border-radius:6px; }
        .result .r-note  { font-size:12px; opacity:.75; }

        /* ── Footer links ── */
        .flinks { text-align:center; font-size:13px; color:var(--tx2); }
        .flinks a { color:var(--gold); text-decoration:none; transition:color .15s; }
        .flinks a:hover { color:var(--gold-l); }
        .footer { text-align:center; font-size:11px; color:rgba(232,220,200,.18); letter-spacing:1px; }

        @media(max-width:480px){ .card-body{padding:18px 16px;} }
    </style>
</head>
<body>
<div class="wrap">

    <!-- Header -->
    <div class="hdr">
        <div class="hdr-icon">⚙️</div>
        <h1>原神私服注册</h1>
        <p>注册您的游戏账号，立即开始冒险</p>
    </div>

    <!-- My Accounts Card -->
    <div class="card" id="my-accs-card">
        <div class="card-head"><span class="card-title">本 IP 已注册账号</span></div>
        <div class="card-body">
            <div class="quota-row">
                <span class="quota-icon">🛡️</span>
                <div class="quota-info">
                    <div class="quota-label">IP 注册配额</div>
                    <div class="qbar"><div class="qbar-fill" id="qbar-fill"></div></div>
                </div>
                <span class="qbar-num" id="qbar-num">…</span>
            </div>
            <div class="accs-title">注册记录</div>
            <div class="accs-list" id="accs-list">
                <div class="accs-empty">加载中…</div>
            </div>
        </div>
    </div>

    <!-- Register Card -->
    <div class="card">
        <div class="card-head"><span class="card-title">注册新账号</span></div>
        <div class="card-body">

            <!-- Result -->
            <div class="result" id="result">
                <div class="r-icon" id="r-icon"></div>
                <div class="r-title" id="r-title"></div>
                <div class="r-acc"  id="r-acc" style="display:none"></div>
                <div class="r-note" id="r-note"></div>
            </div>

            <!-- Form -->
            <div class="form-group">
                <label>游戏账号名</label>
                <input type="text" id="username" placeholder="输入您想要的账号名" maxlength="40" autocomplete="off" spellcheck="false">
                <div class="hint" id="hint">支持任意字符，至少 2 个字符</div>
            </div>

            <div class="rules">
                <div class="rules-title">📋 注册须知</div>
                <ul>
                    <li>每个 IP 地址最多注册 <strong>3</strong> 个账号</li>
                    <li>账号名一经注册无法更改，请谨慎选择</li>
                    <li>账号名支持任意字符（含中文、符号）</li>
                    <li>初始密码请联系管理员或在游戏内设置</li>
                </ul>
            </div>

            <button class="btn btn-primary" id="submit-btn" type="button" onclick="doRegister()">
                <span class="btn-text">立即注册</span>
                <div class="btn-spin"></div>
            </button>
        </div>
    </div>

    <!-- Links -->
    <div class="flinks">
        <a href="/html/index.html">返回主页</a>
        &nbsp;·&nbsp;
        <a href="/html/login.html">管理员登录</a>
    </div>
    <div class="footer">POWERED BY GRASSCUTTER · gc-GM</div>
</div>

<script>
const API = '';
const USERNAME_RE = /^[\s\S]{2,}$/;

// ── 格式化日期 ─────────────────────────────────
function fmtDate(s) {
    if (!s) return '—';
    const d = new Date(s);
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ── 加载当前 IP 账号列表 + 配额 ───────────────────
async function loadMyAccounts() {
    try {
        const resp = await fetch(API + '/api/register/my-accounts');
        const data = await resp.json();

        // 配额条
        const used = data.used || 0;
        const max  = data.max  || 3;
        const pct  = Math.round((used / max) * 100);
        const fill = document.getElementById('qbar-fill');
        fill.style.width = pct + '%';
        if (used >= max) fill.classList.add('full');
        document.getElementById('qbar-num').textContent = `${used} / ${max}`;

        // 账号列表
        const list = document.getElementById('accs-list');
        const accs = data.accounts || [];
        if (accs.length === 0) {
            list.innerHTML = '<div class="accs-empty">该 IP 尚未注册任何账号</div>';
        } else {
            list.innerHTML = accs.map(a => `
                <div class="acc-row">
                    <span class="acc-name">${esc(a.username)}</span>
                    <span class="acc-date">${fmtDate(a.createdAt)}</span>
                </div>`).join('');
        }

        // 如果配额已满则禁用注册按钮
        if (used >= max) {
            document.getElementById('submit-btn').disabled = true;
            showResult('err', '🚫', '注册配额已满', null,
                `该 IP 已注册 ${max} 个账号，已达上限，如需更多请联系管理员`);
        }

        return data;
    } catch (e) {
        document.getElementById('qbar-num').textContent = '获取失败';
        document.getElementById('accs-list').innerHTML = '<div class="accs-empty">加载失败</div>';
    }
}

// ── XSS 转义 ───────────────────────────────────
function esc(t) {
    const d = document.createElement('div');
    d.textContent = String(t || '');
    return d.innerHTML;
}

// ── 用户名实时校验 ─────────────────────────────
const inp  = document.getElementById('username');
const hint = document.getElementById('hint');

inp.addEventListener('input', () => {
    clearResult();
    const v = inp.value;
    if (!v) {
        inp.classList.remove('invalid');
        hint.className = 'hint';
        hint.textContent = '支持任意字符，至少 2 个字符';
    } else if (!USERNAME_RE.test(v)) {
        inp.classList.add('invalid');
        hint.className = 'hint err';
        hint.textContent = '账号名至少需要 2 个字符';
    } else {
        inp.classList.remove('invalid');
        hint.className = 'hint ok';
        hint.textContent = '✓ 格式正确';
    }
});

// ── 结果显示 ───────────────────────────────────
function showResult(type, icon, title, account, note) {
    const box = document.getElementById('result');
    box.className = 'result ' + type;
    document.getElementById('r-icon').textContent  = icon;
    document.getElementById('r-title').textContent = title;
    const accEl = document.getElementById('r-acc');
    if (account) { accEl.style.display = 'block'; accEl.textContent = account; }
    else { accEl.style.display = 'none'; }
    document.getElementById('r-note').textContent = note || '';
    box.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function clearResult() {
    document.getElementById('result').className = 'result';
}

// ── 提交注册 ───────────────────────────────────
async function doRegister() {
    const username = inp.value.trim();
    if (!username || !USERNAME_RE.test(username)) { inp.focus(); return; }
    clearResult();

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.classList.add('loading');

    try {
        const resp = await fetch(API + '/api/register/account', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
        });
        const data = await resp.json();

        if (data.success) {
            showResult('ok', '✅', '注册成功！', data.username,
                `账号已创建，请使用此账号登录游戏。剩余配额：${data.remainingQuota ?? '?'} 个`);
            inp.value = '';
            hint.className = 'hint';
            hint.textContent = '支持任意字符，至少 2 个字符';
            inp.classList.remove('invalid');
            await loadMyAccounts();   // 刷新账号列表
        } else {
            showResult('err', '❌', '注册失败', null, data.message || '未知错误');
        }
    } catch (err) {
        showResult('err', '⚠️', '请求失败', null, '无法连接到服务器，请稍后重试');
    } finally {
        btn.classList.remove('loading');
        // 重新检查配额决定是否解锁按钮
        const quota = await loadMyAccounts();
        if (!quota || (quota.used || 0) < (quota.max || 3)) {
            btn.disabled = false;
        }
    }
}

// ── 初始化 ─────────────────────────────────────
loadMyAccounts();
</script>
</body>
</html>
