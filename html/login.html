<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Genshin GM Tool</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Microsoft YaHei',Arial,sans-serif;
            background:url('/data/bg/kun-gmligt.jpg') no-repeat center center fixed;
            background-size:cover;
            min-height:100vh;
            display:flex; justify-content:center; align-items:center; padding:20px;
        }
        .container {
            background:rgba(255,255,255,0.45);
            backdrop-filter:blur(20px) saturate(180%);
            -webkit-backdrop-filter:blur(20px) saturate(180%);
            border:1px solid rgba(255,255,255,0.3);
            border-radius:20px;
            box-shadow:0 20px 60px rgba(0,0,0,0.15);
            width:75vw; max-width:1200px; min-width:320px;
            overflow:hidden;
        }
        .header {
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white; padding:36px 40px; text-align:center;
        }
        .header h1 { font-size:30px; margin-bottom:8px; }
        .header p  { font-size:14px; opacity:.9; }
        .tabs { display:flex; background:rgba(255,255,255,0.3); }
        .tab {
            flex:1; padding:16px; text-align:center; cursor:pointer;
            font-weight:600; color:#666; font-size:15px;
            transition:all .3s; border-bottom:3px solid transparent;
        }
        .tab.active { color:#667eea; background:rgba(255,255,255,0.5); border-bottom-color:#667eea; }
        .tab:hover:not(.active) { background:rgba(255,255,255,0.35); }
        .body-wrap { display:grid; grid-template-columns:1fr 1fr; min-height:380px; }
        .form-container { padding:36px 40px; }
        .form-section { display:none; }
        .form-section.active { display:block; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; margin-bottom:8px; color:#333; font-weight:600; font-size:14px; }
        .form-group input {
            width:100%; padding:12px 15px;
            border:1px solid rgba(102,126,234,0.25); border-radius:8px;
            font-size:15px; transition:all .3s; background:rgba(255,255,255,0.5);
        }
        .form-group input:focus { outline:none; border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.1); }
        .form-group input::placeholder { color:#999; }
        .form-group .hint { font-size:12px; color:#666; margin-top:5px; }
        .submit-btn {
            width:100%; padding:14px;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white; border:none; border-radius:8px;
            font-size:16px; font-weight:600; cursor:pointer;
            transition:transform .2s,box-shadow .2s;
        }
        .submit-btn:hover { transform:translateY(-2px); box-shadow:0 5px 20px rgba(102,126,234,0.4); }
        .submit-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
        .message { padding:12px 15px; border-radius:8px; margin-bottom:18px; font-size:14px; display:none; }
        .message.success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; display:block; }
        .message.error   { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; display:block; }
        .loading { display:none; text-align:center; padding:20px; }
        .loading.show { display:block; }
        .loading-spinner {
            border:3px solid #f3f3f3; border-top-color:#667eea;
            border-radius:50%; width:40px; height:40px;
            animation:spin 1s linear infinite; margin:0 auto;
        }
        @keyframes spin { to{transform:rotate(360deg)} }
        .info-panel {
            background:linear-gradient(135deg,rgba(102,126,234,0.08) 0%,rgba(118,75,162,0.08) 100%);
            border-left:1px solid rgba(255,255,255,0.3);
            padding:36px 40px; display:flex; flex-direction:column; gap:16px;
        }
        .ann-header {
            display:flex; align-items:center; gap:10px; margin-bottom:4px;
        }
        .ann-header .ann-title {
            font-size:18px; font-weight:700; color:#667eea; flex:1;
        }
        .ann-updated { font-size:11px; color:#aaa; }
        .ann-body {
            background:rgba(255,255,255,0.5);
            backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.35);
            border-radius:12px; padding:20px 22px;
            flex:1; overflow-y:auto; max-height:340px;
        }
        .ann-content {
            font-size:14px; color:#333; line-height:1.85;
            white-space:pre-wrap; word-break:break-word;
        }
        .ann-empty { font-size:14px; color:#aaa; font-style:italic; }
        .ann-loading { font-size:13px; color:#aaa; text-align:center; padding:20px 0; }
        .footer {
            text-align:center; padding:16px; color:#666; font-size:13px;
            background:rgba(255,255,255,0.25); border-top:1px solid rgba(255,255,255,0.2);
        }
        .footer a { color:#667eea; text-decoration:none; font-weight:600; }
        .footer a:hover { text-decoration:underline; }
        @supports not (backdrop-filter:blur(1px)) {
            .container,.info-item { background:rgba(255,255,255,0.88); }
        }
        @media(max-width:768px) {
            body { padding:10px; align-items:flex-start; padding-top:20px; }
            .container { width:95vw; }
            .body-wrap { grid-template-columns:1fr; }
            .info-panel { display:none; }
            .form-container { padding:24px 20px; }
            .header { padding:24px 20px; }
            .header h1 { font-size:24px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>🎮 Genshin GM Tool</h1>
        <p>原神 GM 指令生成器 · 管理员登录</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login',this)">登录</div>
        <div class="tab"       onclick="switchTab('register',this)">注册管理账号</div>
    </div>

    <div class="body-wrap">
        <div class="form-container">

            <!-- Login -->
            <div id="login-section" class="form-section active">
                <div id="login-message" class="message"></div>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-username">用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="submit-btn" id="login-btn">登录</button>
                </form>
                <div id="login-loading" class="loading">
                    <div class="loading-spinner"></div>
                    <p style="margin-top:10px;color:#666;">正在登录…</p>
                </div>
            </div>

            <!-- Register -->
            <div id="register-section" class="form-section">
                <div id="register-message" class="message"></div>
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="register-username">用户名</label>
                        <input type="text" id="register-username" placeholder="请输入用户名" required autocomplete="username">
                        <div class="hint">用户名将作为您的唯一标识</div>
                    </div>
                    <div class="form-group">
                        <label for="register-password">密码</label>
                        <input type="password" id="register-password" placeholder="请输入密码（至少 6 位）" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="register-password-confirm">确认密码</label>
                        <input type="password" id="register-password-confirm" placeholder="再次输入密码" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="submit-btn" id="register-btn">注册</button>
                </form>
                <div id="register-loading" class="loading">
                    <div class="loading-spinner"></div>
                    <p style="margin-top:10px;color:#666;">正在注册…</p>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <div class="ann-header">
                <span class="ann-title" id="ann-title">📢 服务器公告</span>
                <span class="ann-updated" id="ann-updated"></span>
            </div>
            <div class="ann-body">
                <div class="ann-loading" id="ann-loading">加载中…</div>
                <div class="ann-content" id="ann-content" style="display:none"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        玩家注册游戏账号请点 <a href="/html/register.html">这里</a>
        &nbsp;·&nbsp; Genshin GM Tool © 2024
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('sessionToken');
        if (token) validateSession(token);
    });

    async function validateSession(token) {
        try {
            const r = await fetch('/api/auth/user-info?sessionToken=' + encodeURIComponent(token));
            const d = await r.json();
            if (d.success) window.location.href = '/index.html';
            else ['sessionToken','username','verifiedUids'].forEach(k=>localStorage.removeItem(k));
        } catch(e) {
            ['sessionToken','username','verifiedUids'].forEach(k=>localStorage.removeItem(k));
        }
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
        document.getElementById(tab+'-section').classList.add('active');
        hideMessage('login'); hideMessage('register');
    }
    function showMessage(type, msg, isErr) {
        var el=document.getElementById(type+'-message');
        el.textContent=msg; el.className='message '+(isErr?'error':'success');
    }
    function hideMessage(type) {
        var el=document.getElementById(type+'-message');
        el.style.display='none'; el.className='message';
    }
    function showLoading(type, show) {
        document.getElementById(type+'-loading').classList[show?'add':'remove']('show');
        document.getElementById(type+'-form').style.display=show?'none':'block';
        document.getElementById(type+'-btn').disabled=show;
    }

    async function handleLogin(e) {
        e.preventDefault();
        var username=document.getElementById('login-username').value.trim();
        var password=document.getElementById('login-password').value;
        if(!username||!password){showMessage('login','请填写所有字段',true);return;}
        hideMessage('login'); showLoading('login',true);
        try {
            var r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
            var d=await r.json();
            if(d.success){
                localStorage.setItem('sessionToken',d.sessionToken);
                localStorage.setItem('username',d.username);
                localStorage.setItem('verifiedUids',JSON.stringify(d.verifiedUids||[]));
                showMessage('login','登录成功！正在跳转…',false);
                setTimeout(()=>{window.location.href='/index.html';},900);
            } else { showLoading('login',false); showMessage('login',d.message||'登录失败',true); }
        } catch(err) { showLoading('login',false); showMessage('login','登录失败：'+err.message,true); }
    }

    async function handleRegister(e) {
        e.preventDefault();
        var username=document.getElementById('register-username').value.trim();
        var password=document.getElementById('register-password').value;
        var p2=document.getElementById('register-password-confirm').value;
        if(!username||!password||!p2){showMessage('register','请填写所有字段',true);return;}
        if(password.length<6){showMessage('register','密码至少需要 6 个字符',true);return;}
        if(password!==p2){showMessage('register','两次输入的密码不一致',true);return;}
        hideMessage('register'); showLoading('register',true);
        try {
            var r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
            var d=await r.json();
            showLoading('register',false);
            if(d.success){
                showMessage('register','✅ 注册成功！正在切换到登录…',false);
                document.getElementById('register-form').reset();
                setTimeout(()=>{
                    hideMessage('register');
                    document.querySelector('.tab').click();
                    document.getElementById('login-username').value=username;
                    document.getElementById('login-password').focus();
                },2000);
            } else { showMessage('register',d.message||'注册失败',true); }
        } catch(err) { showLoading('register',false); showMessage('register','注册失败：'+err.message,true); }
    }

    document.getElementById('login-password').addEventListener('keypress',function(e){if(e.key==='Enter')handleLogin(e);});
    document.getElementById('register-password-confirm').addEventListener('keypress',function(e){if(e.key==='Enter')handleRegister(e);});

    // ── 公告加载 ──────────────────────────────────────────────────────────
    (async function loadAnnouncement() {
        try {
            var r = await fetch('/api/announcement');
            var d = await r.json();
            document.getElementById('ann-loading').style.display = 'none';
            var content = document.getElementById('ann-content');
            if (d.success && d.enabled) {
                if (d.title) document.getElementById('ann-title').textContent = d.title;
                if (d.updatedAt) document.getElementById('ann-updated').textContent = d.updatedAt;
                content.textContent = d.content || '（暂无内容）';
                content.style.display = 'block';
            } else {
                content.className = 'ann-empty';
                content.textContent = '（暂无公告）';
                content.style.display = 'block';
            }
        } catch(e) {
            document.getElementById('ann-loading').textContent = '公告加载失败';
        }
    })();
</script>
</body>
</html>
