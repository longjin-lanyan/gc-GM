<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 原神 GM 指令生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('/data/bg/kun-gmligt.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .command-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .command-table th,
        .command-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .command-table th {
            background: rgba(255, 255, 255, 0.35);
            color: #333;
            font-weight: bold;
        }

        .command-table tr:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 5px;
            transition: all 0.3s;
        }

        .approve-btn {
            background: #28a745;
            color: white;
        }

        .approve-btn:hover {
            background: #218838;
        }

        .reject-btn {
            background: #ffc107;
            color: #333;
        }

        .reject-btn:hover {
            background: #e0a800;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .view-btn {
            background: #667eea;
            color: white;
        }

        .view-btn:hover {
            background: #5568d3;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-field {
            margin-bottom: 20px;
        }

        .modal-field label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .modal-field .value {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            color: #666;
            word-break: break-all;
        }

        .modal-field textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* 安卓兼容性：不支持 backdrop-filter 时使用更高不透明度背景 */
        @supports not (backdrop-filter: blur(1px)) {
            .container {
                background: rgba(255, 255, 255, 0.88);
            }
            .modal-content {
                background: rgba(255, 255, 255, 0.92);
            }
            .command-table th {
                background: rgba(248, 249, 250, 0.9);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1>🛠️ 管理后台</h1>

        <!-- 统计数据 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">总指令数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-pending">0</div>
                <div class="stat-label">待审核</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-approved">0</div>
                <div class="stat-label">已通过</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-rejected">0</div>
                <div class="stat-label">已拒绝</div>
            </div>
        </div>

        <!-- 选项卡 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pending')">待审核</button>
            <button class="tab-btn" onclick="switchTab('all')">所有指令</button>
        </div>

        <!-- 待审核列表 -->
        <div id="pending-tab" class="tab-content active">
            <div id="pending-list"></div>
        </div>

        <!-- 所有指令列表 -->
        <div id="all-tab" class="tab-content">
            <div id="all-list"></div>
        </div>
    </div>

    <!-- 查看详情模态框 -->
    <div class="modal" id="view-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>指令详情</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- 审核模态框 -->
    <div class="modal" id="review-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="review-title">审核指令</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label>指令分类：</label>
                    <select id="review-category" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                        <option value="item">物品</option>
                        <option value="weapon">武器</option>
                        <option value="avatar">角色</option>
                        <option value="quest">任务</option>
                        <option value="scene">场景</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="modal-field">
                    <label>审核备注（可选）：</label>
                    <textarea id="review-note" rows="4" placeholder="请输入审核备注..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="action-btn reject-btn" onclick="closeModal()">取消</button>
                <button class="action-btn approve-btn" id="confirm-review-btn" onclick="confirmReview()">确认</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'pending';
        let currentReviewId = null;
        let currentReviewAction = null;
        let adminToken = '';

        // 初始化
        async function init() {
            adminToken = prompt('请输入管理员Token (adminToken):');
            if (!adminToken || !adminToken.trim()) {
                document.querySelector('.container').innerHTML = '<h1>需要管理员认证</h1><p style="text-align:center;color:#666;">请刷新页面并输入正确的adminToken</p>';
                return;
            }
            adminToken = adminToken.trim();
            await loadStats();
            await loadPendingCommands();
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/api/commands/admin/all?adminToken=' + encodeURIComponent(adminToken), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Accept': 'application/json', 'X-Admin-Token': adminToken},
                    body: JSON.stringify({ adminToken })
                });
                if (!response.ok) {
                    const text = await response.text();
                    console.error('loadStats HTTP错误:', response.status, text);
                    return;
                }
                const commands = await response.json();
                if (commands.success === false || (commands.retcode && commands.retcode !== 200)) {
                    alert('认证失败: ' + (commands.message || '未知错误'));
                    return;
                }
                if (!Array.isArray(commands)) {
                    console.error('loadStats: 响应不是数组', commands);
                    return;
                }

                const total = commands.length;
                const pending = commands.filter(c => c.reviewStatus === 'PENDING').length;
                const approved = commands.filter(c => c.reviewStatus === 'APPROVED').length;
                const rejected = commands.filter(c => c.reviewStatus === 'REJECTED').length;

                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-pending').textContent = pending;
                document.getElementById('stat-approved').textContent = approved;
                document.getElementById('stat-rejected').textContent = rejected;
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 切换选项卡
        async function switchTab(tab) {
            currentTab = tab;

            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 更新内容显示
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');

            // 加载数据
            if (tab === 'pending') {
                await loadPendingCommands();
            } else {
                await loadAllCommands();
            }
        }

        // 加载待审核指令
        async function loadPendingCommands() {
            const listDiv = document.getElementById('pending-list');
            listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏳</div><div>加载中...</div></div>';

            try {
                const response = await fetch('/api/commands/admin/pending?adminToken=' + encodeURIComponent(adminToken), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Accept': 'application/json', 'X-Admin-Token': adminToken},
                    body: JSON.stringify({ adminToken })
                });
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error('HTTP ' + response.status + ': ' + text.substring(0, 200));
                }
                const commands = await response.json();
                if (commands.success === false || (commands.retcode && commands.retcode !== 200)) {
                    listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div>' + (commands.message || '认证失败') + '</div></div>';
                    return;
                }
                if (!Array.isArray(commands)) {
                    throw new Error('响应格式错误: ' + JSON.stringify(commands).substring(0, 200));
                }

                if (commands.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>暂无待审核指令</div></div>';
                    return;
                }

                listDiv.innerHTML = `
                    <table class="command-table">
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>分类</th>
                                <th>上传者</th>
                                <th>上传时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${commands.map(cmd => `
                                <tr>
                                    <td>${escapeHtml(cmd.title)}</td>
                                    <td>${getCategoryName(cmd.category)}</td>
                                    <td>${escapeHtml(cmd.uploaderName || '匿名')}</td>
                                    <td>${formatDate(cmd.uploadTime)}</td>
                                    <td>
                                        <button class="action-btn view-btn" onclick="viewCommand('${cmd.id}')">查看</button>
                                        <button class="action-btn approve-btn" onclick="openReview('${cmd.id}', 'approve', '${cmd.category}')">通过</button>
                                        <button class="action-btn reject-btn" onclick="openReview('${cmd.id}', 'reject', '${cmd.category}')">拒绝</button>
                                        <button class="action-btn delete-btn" onclick="deleteCommand('${cmd.id}')">删除</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('加载待审核指令失败:', error);
                listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><div>加载失败: ' + error.message + '</div></div>';
            }
        }

        // 加载所有指令
        async function loadAllCommands() {
            const listDiv = document.getElementById('all-list');
            listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏳</div><div>加载中...</div></div>';

            try {
                const response = await fetch('/api/commands/admin/all?adminToken=' + encodeURIComponent(adminToken), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Accept': 'application/json', 'X-Admin-Token': adminToken},
                    body: JSON.stringify({ adminToken })
                });
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error('HTTP ' + response.status + ': ' + text.substring(0, 200));
                }
                const commands = await response.json();
                if (commands.success === false || (commands.retcode && commands.retcode !== 200)) {
                    listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div>' + (commands.message || '认证失败') + '</div></div>';
                    return;
                }
                if (!Array.isArray(commands)) {
                    throw new Error('响应格式错误: ' + JSON.stringify(commands).substring(0, 200));
                }

                if (commands.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>暂无指令</div></div>';
                    return;
                }

                listDiv.innerHTML = `
                    <table class="command-table">
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>分类</th>
                                <th>上传者</th>
                                <th>状态</th>
                                <th>点赞</th>
                                <th>浏览</th>
                                <th>上传时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${commands.map(cmd => `
                                <tr>
                                    <td>${escapeHtml(cmd.title)}</td>
                                    <td>${getCategoryName(cmd.category)}</td>
                                    <td>${escapeHtml(cmd.uploaderName || '匿名')}</td>
                                    <td><span class="status-badge status-${cmd.reviewStatus.toLowerCase()}">${getStatusName(cmd.reviewStatus)}</span></td>
                                    <td>${cmd.likes}</td>
                                    <td>${cmd.views}</td>
                                    <td>${formatDate(cmd.uploadTime)}</td>
                                    <td>
                                        <button class="action-btn view-btn" onclick="viewCommand('${cmd.id}')">查看</button>
                                        <button class="action-btn delete-btn" onclick="deleteCommand('${cmd.id}')">删除</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('加载所有指令失败:', error);
                listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><div>加载失败: ' + error.message + '</div></div>';
            }
        }

        // 查看指令详情
        async function viewCommand(id) {
            try {
                const response = await fetch('/api/commands/admin/all?adminToken=' + encodeURIComponent(adminToken), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'X-Admin-Token': adminToken},
                    body: JSON.stringify({ adminToken })
                });
                const commands = await response.json();
                if (commands.success === false || (commands.retcode && commands.retcode !== 200)) { return; }
                const cmd = commands.find(c => String(c.id) === String(id));

                if (!cmd) {
                    alert('指令不存在');
                    return;
                }

                const modalBody = document.getElementById('modal-body');
                modalBody.innerHTML = `
                    <div class="modal-field">
                        <label>标题：</label>
                        <div class="value">${escapeHtml(cmd.title)}</div>
                    </div>
                    <div class="modal-field">
                        <label>描述：</label>
                        <div class="value">${escapeHtml(cmd.description)}</div>
                    </div>
                    <div class="modal-field">
                        <label>指令内容：</label>
                        <div class="value">${escapeHtml(cmd.command)}</div>
                    </div>
                    <div class="modal-field">
                        <label>分类：</label>
                        <div class="value">${getCategoryName(cmd.category)}</div>
                    </div>
                    <div class="modal-field">
                        <label>上传者：</label>
                        <div class="value">${escapeHtml(cmd.uploaderName || '匿名')}</div>
                    </div>
                    <div class="modal-field">
                        <label>审核状态：</label>
                        <div class="value"><span class="status-badge status-${cmd.reviewStatus.toLowerCase()}">${getStatusName(cmd.reviewStatus)}</span></div>
                    </div>
                    ${cmd.reviewNote ? `
                        <div class="modal-field">
                            <label>审核备注：</label>
                            <div class="value">${escapeHtml(cmd.reviewNote)}</div>
                        </div>
                    ` : ''}
                    <div class="modal-field">
                        <label>统计数据：</label>
                        <div class="value">点赞: ${cmd.likes} | 浏览: ${cmd.views}</div>
                    </div>
                    <div class="modal-field">
                        <label>上传时间：</label>
                        <div class="value">${formatDate(cmd.uploadTime)}</div>
                    </div>
                    ${cmd.reviewTime ? `
                        <div class="modal-field">
                            <label>审核时间：</label>
                            <div class="value">${formatDate(cmd.reviewTime)}</div>
                        </div>
                    ` : ''}
                `;

                document.getElementById('view-modal').classList.add('active');
            } catch (error) {
                console.error('查看详情失败:', error);
                alert('查看详情失败');
            }
        }

        // 打开审核对话框
        function openReview(id, action, category) {
            currentReviewId = id;
            currentReviewAction = action;

            document.getElementById('review-title').textContent = action === 'approve' ? '通过审核' : '拒绝审核';
            document.getElementById('review-note').value = '';

            // 设置分类选择器的值
            if (category) {
                document.getElementById('review-category').value = category;
            }

            document.getElementById('review-modal').classList.add('active');
        }

        // 确认审核
        async function confirmReview() {
            if (!currentReviewId || !currentReviewAction) return;

            const reviewNote = document.getElementById('review-note').value.trim();
            const category = document.getElementById('review-category').value;

            try {
                const endpoint = currentReviewAction === 'approve' ? 'approve' : 'reject';
                const response = await fetch(`/api/commands/admin/${currentReviewId}/${endpoint}?adminToken=${encodeURIComponent(adminToken)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': adminToken
                    },
                    body: JSON.stringify({ reviewNote, category, adminToken })
                });

                const result = await response.json();

                if (result.success) {
                    alert('✅ 审核成功');
                    closeModal();
                    await loadStats();
                    await loadPendingCommands();
                } else {
                    alert('❌ 审核失败: ' + result.message);
                }
            } catch (error) {
                console.error('审核失败:', error);
                alert('审核失败: ' + error.message);
            }
        }

        // 删除指令
        async function deleteCommand(id) {
            if (!confirm('确定要删除这个指令吗？此操作不可恢复！')) {
                return;
            }

            try {
                const response = await fetch(`/api/commands/admin/${id}/delete?adminToken=${encodeURIComponent(adminToken)}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'X-Admin-Token': adminToken},
                    body: JSON.stringify({ adminToken })
                });

                const result = await response.json();

                if (result.success) {
                    alert('✅ 删除成功');
                    await loadStats();
                    if (currentTab === 'pending') {
                        await loadPendingCommands();
                    } else {
                        await loadAllCommands();
                    }
                } else {
                    alert('❌ 删除失败: ' + result.message);
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败: ' + error.message);
            }
        }

        // 关闭模态框
        function closeModal() {
            document.querySelectorAll('.modal').forEach(modal => modal.classList.remove('active'));
            currentReviewId = null;
            currentReviewAction = null;
        }

        // 工具函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCategoryName(category) {
            const names = {
                'item': '物品',
                'weapon': '武器',
                'avatar': '角色',
                'quest': '任务',
                'scene': '场景',
                'other': '其他'
            };
            return names[category] || category;
        }

        function getStatusName(status) {
            const names = {
                'PENDING': '待审核',
                'APPROVED': '已通过',
                'REJECTED': '已拒绝'
            };
            return names[status] || status;
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
